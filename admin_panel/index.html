<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Proctoring Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #020617, #020617, #020617);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            width: 1100px;
            max-width: 95%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(56, 189, 248, 0.25);
            border: 1px solid rgba(56, 189, 248, 0.4);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: #38bdf8;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .dot {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: red;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            flex: 1;
            background: rgba(2, 6, 23, 0.85);
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 18px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
        }

        .card h2 {
            font-size: 36px;
            color: #38bdf8;
            margin-bottom: 5px;
        }

        .card p {
            color: #94a3b8;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #020617;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
        }

        .log-box {
            background: rgba(2, 6, 23, 0.85);
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 18px;
            padding: 20px;
            height: 350px;
            overflow-y: auto;
            font-family: Consolas, monospace;
            line-height: 1.6;
        }

        .log-normal {
            color: #22c55e;
        }

        .log-suspicious {
            color: #ef4444;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            font-size: 14px;
        }

        .sessions-table {
    max-height: 420px;
    overflow-y: auto;
    margin-top: 20px;
    border-radius: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
}

thead {
    position: sticky;
    top: 0;
    background: #020617;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid rgba(56,189,248,0.2);
    text-align: center;
}

tr.terminated {
    background: rgba(220,38,38,0.25);
}

tr.completed {
    background: rgba(34,197,94,0.15);
}

.logs-btn {
    background: none;
    color: #38bdf8;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🛡️ AI Proctoring Admin Panel</h1>
        <div class="status">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h2 id="totalLogs">0</h2>
            <p>Total Activities</p>
        </div>


<div class="sessions-table">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Status</th>
        <th>Violations</th>
        <th>Score</th>
        <th>Logs</th>
      </tr>
    </thead>
    <tbody id="sessionsBody"></tbody>
  </table>
</div>


        <div class="card">
            <h2 id="suspiciousCount">0</h2>
            <p>Suspicious Activities</p>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="loadLogs()">Load Logs</button>
        <button class="btn" onclick="clearLogs()">Clear Logs</button>
        <button class="btn" onclick="autoRefresh()">Auto Refresh</button>
        <button class="btn" onclick="downloadLogs()">Download Logs</button>
    </div>

    <div class="log-box" id="logBox">
        Waiting for logs...
    </div>

    <div class="footer">
        AI Based Online Examination Proctoring System | Admin Panel
    </div>

</div>

<script>
const backendURL = "http://127.0.0.1:5000";
let autoInterval = null;

/* ================= BACKEND STATUS ================= */
function checkBackend() {
    fetch(backendURL + "/get_sessions")
        .then(res => res.json())
        .then(() => {
            document.getElementById("statusDot").style.background = "lime";
            document.getElementById("statusText").innerText = "Backend Connected";
        })
        .catch(() => {
            document.getElementById("statusDot").style.background = "red";
            document.getElementById("statusText").innerText = "Backend Disconnected";
        });
}

/* ================= LOAD SESSIONS ================= */
function loadSessions() {
    fetch(backendURL + "/get_sessions")
        .then(res => res.json())
        .then(data => {
            console.log("ADMIN DATA:", data);

            const tbody = document.getElementById("sessionsBody");
            tbody.innerHTML = "";

            let totalLogs = 0;
            let suspiciousCount = 0;

            data.sessions.forEach(s => {
                totalLogs += s.events.length;
                suspiciousCount += s.violations;

                const row = document.createElement("tr");
                row.className = s.status === "TERMINATED"
                    ? "terminated"
                    : "completed";

                row.innerHTML = `
                    <td>${s.name}</td>
                    <td>${s.roll}</td>
                    <td>${s.status}</td>
                    <td>${s.violations}</td>
                    <td>${s.score ?? "-"}</td>
                    <td>
                        <button class="logs-btn"
                            onclick="alert(\`${s.events.join("\\n")}\`)">
                            View
                        </button>
                    </td>
                `;

                tbody.appendChild(row);
            });

            document.getElementById("totalLogs").innerText = totalLogs;
            document.getElementById("suspiciousCount").innerText = suspiciousCount;
        })
        .catch(err => {
            console.error("ADMIN LOAD ERROR:", err);
        });
}


/* ================= CONTROLS ================= */
function clearLogs() {
    fetch(backendURL + "/clear_logs", { method: "POST" })
        .then(res => res.json())
        .then(() => {
            document.getElementById("sessionsBody").innerHTML = "";
            document.getElementById("totalLogs").innerText = 0;
            document.getElementById("suspiciousCount").innerText = 0;
        });
}

function autoRefresh() {
    if (autoInterval === null) {
        autoInterval = setInterval(loadSessions, 3000);
        alert("Auto refresh enabled");
    } else {
        clearInterval(autoInterval);
        autoInterval = null;
        alert("Auto refresh disabled");
    }
}

function downloadLogs() {
    fetch(backendURL + "/get_logs")
        .then(res => res.json())
        .then(data => {
            const blob = new Blob([data.logs.join("")], { type: "text/plain" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "proctoring_logs.txt";
            a.click();

            URL.revokeObjectURL(url);
        });
}

/* ================= INIT ================= */
checkBackend();
loadSessions();
</script>



</body>
</html>
