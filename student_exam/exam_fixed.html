<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Proctored Online Test</title>

    <style>
        body { margin:0; font-family: Arial; background:#f4f6f8; }


        #startScreen {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f1f5f9;
        }

        .start-box {
            background:white;
            padding:30px;
            width:350px;
            border-radius:8px;
            text-align:center;
            box-shadow:0 010px rgba(0,0,0,0.1);
        }

        .start-box input {
            width:100%;
            padding:10px;
            margin-bottom:15px;
        }

        .start-box button {
            width:100%;
            padding:10px;
            background:#16a34a;
            color:white;
            border:none;
            border-radius:5px;
            font-weight:bold;
            cursor:pointer;
        }

        #examScreen { display:none; }

        .top-bar {
            background:#1e3a8a;
            color:white;
            padding:10px 20px;
            display:flex;
            justify-content:space-between;
        }

        .timer {
            background:#0f172a;
            padding:6px 12px;
            border-radius:5px;
            font-weight:bold;
        }

        .main-container {
            display:flex;
            height:calc(100vh - 50px);
        }

        .question-panel {
            flex:3;
            padding:20px;
            background:white;
        }

        .options {
            margin-top:15px;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .option {
            padding:10px;
            border:1px solid #d1d5db;
            border-radius:19px;
            cursor:pointer;
        }

        .bottom-controls {
            margin-top:20px;
            display:flex;
            gap:10px;
        }

        .btn {
            padding:8px 14px;
            border:none;
            border-radius:4px;
            cursor:pointer;
            font-weight:bold;
        }

        .save { background:#16a34a; color:white; }
        .mark { background:#f59e0b; color:white; }
        .clear { background:#dc2626; color:white; }
        .next { background:#2563eb; color:white; margin-left:auto; }

        .palette-panel {
            flex:1;
            background:#f8fafc;
            border-left:1px solid #d1d5db;
            padding:15px;
        }

        .palette {
            display:grid;
            grid-template-columns:repeat(5,1fr);
            gap:8px;
        }

        .palette button {
            padding:8px;
            border:none;
            border-radius:4px;
            cursor:pointer;
            font-weight:bold;
            background:#e5e7eb;
        }

        .answered { background:#16a34a !important; color:white; }
        .marked { background:#f59e0b !important; color:white; }
        .not-answered { background:#dc2626 !important; color:white; }
    </style>
</head>

<body>
    <script>
alert("I AM IN EXAM_FIXED.HTML");
</script>


<!-- START SCREEN -->
<div id="startScreen">
    <div class="start-box">
        <h2>AI Proctored Online Test</h2>
        <input type="text" id="studentName" placeholder="Enter Name">
        <input type="text" id="rollNumber" placeholder="Enter Roll Number">
        <button type="button" onclick="startExam()">Start Exam</button>
    </div>
</div>

<!-- EXAM SCREEN -->
<div id="examScreen">

    <div class="top-bar">
        <h2>Online Test – AI Proctored Mode</h2>
        <div class="timer" id="timer">05:00</div>
    </div>

    <div class="main-container">

        <div class="question-panel">
            <h3 id="questionText"></h3>
            <div class="options" id="optionsBox"></div>

            <div class="bottom-controls">
                <button class="btn save" onclick="saveAnswer()">Save & Next</button>
                <button class="btn mark" onclick="markForReview()">Mark for Review</button>
                <button class="btn clear" onclick="clearAnswer()">Clear</button>
                <button class="btn next" onclick="nextQuestion()">Next</button>
                <button class="btn clear" onclick="confirmSubmit()">Submit Exam</button>
            </div>
        </div>

        <div class="palette-panel">
            <h4>Question Palette</h4>
            <div class="palette" id="palette"></div>
        </div>

    </div>

</div>

<script>
const questions = [
    { q: "1. What is the capital of India?", options: ["Mumbai","Delhi","Chennai","Kolkata"], answer: 1 },
    { q: "2. Which number is prime?", options: ["4","6","9","7"], answer: 3 },
    { q: "3. 25% of 200 is?", options: ["25","50","75","100"], answer: 1 }
];

let current = 0;
let userAnswers = new Array(questions.length).fill(null);
let marked = new Array(questions.length).fill(false);

let time = 300;
let timerInterval = null;

function startExam() {
    alert("START BUTTON CLICKED");
    const name = document.getElementById("studentName").value.trim();
    const roll = document.getElementById("rollNumber").value.trim();

    if (!name || !roll) {
        alert("Enter Name and Roll Number");
        return;
    }

    console.log("START CLICKED");

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("examScreen").style.display = "block";

    fetch("http://127.0.0.1:5000/start_session", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ name, roll })
    });

    loadQuestion();
    startTimer();
}

function loadQuestion() {
    const q = questions[current];
    document.getElementById("questionText").innerText = q.q;

    const box = document.getElementById("optionsBox");
    box.innerHTML = "";

    q.options.forEach((opt, i) => {
        const label = document.createElement("label");
        label.className = "option";

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "optionGroup";
        radio.checked = userAnswers[current] === i;

        radio.onclick = () => {
            userAnswers[current] = i;
            renderPalette();
        };

        label.appendChild(radio);
        label.appendChild(document.createTextNode(" " + opt));
        box.appendChild(label);
    });

    renderPalette();
}

function nextQuestion() {
    if (current < questions.length - 1) {
        current++;
        loadQuestion();
    }
}

function saveAnswer() {
    if (userAnswers[current] === null) {
        alert("Please select an option first");
        return;
    }
    nextQuestion();
}

function markForReview() {
    marked[current] = true;
    renderPalette();
    nextQuestion();
}

function clearAnswer() {
    userAnswers[current] = null;
    marked[current] = false;
    loadQuestion();
    renderPalette();
}

function renderPalette() {
    const palette = document.getElementById("palette");
    palette.innerHTML = "";

    questions.forEach((q, i) => {
        const btn = document.createElement("button");

        if (marked[i]) btn.className = "marked";
        else if (userAnswers[i] !== null) btn.className = "answered";
        else btn.className = "not-answered";

        btn.innerText = i + 1;
        btn.onclick = () => {
            current = i;
            loadQuestion();
        };

        palette.appendChild(btn);
    });
}

function confirmSubmit() {
    if (confirm("Submit exam?")) submitExam();
}

function submitExam() {
    const name = document.getElementById("studentName").value.trim();
    const roll = document.getElementById("rollNumber").value.trim();

    let score = 0;
    questions.forEach((q, i) => {
        if (userAnswers[i] === q.answer) score++;
    });

    fetch("http://127.0.0.1:5000/submit_exam", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ name, roll, score, total: questions.length })
    });

    alert("Exam submitted. Score: " + score);
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        const min = Math.floor(time / 60);
        const sec = time % 60;

        document.getElementById("timer").innerText =
            `${min.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`;

        time--;

        if (time < 0) {
            clearInterval(timerInterval);
            submitExam();
        }
    }, 1000);
}
</script>

</body>
</html>
