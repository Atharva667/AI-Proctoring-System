<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Flow</title>
    <style>
        body { margin:0; font-family: Arial; }

        #startScreen {
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#f1f5f9;
        }

        #examScreen {
            display:none;
            padding:20px;
        }

        button {
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }
        .answered { background:#16a34a !important; color:white; }
.marked { background:#f59e0b !important; color:white; }
.not-answered { background:#dc2626 !important; color:white; }

    </style>
</head>
<body>

<div id="startScreen">
    <div>
        <h2>AI Proctored Online Test</h2>
        <input type="text" id="studentName" placeholder="Enter Name"><br><br>
        <input type="text" id="rollNumber" placeholder="Enter Roll Number"><br><br>
        <button type="button" onclick="startExam(event)">Start Exam</button>
    </div>
</div>

<div id="examScreen" style="display:none;">

    <!-- TOP BAR -->
    <div class="top-bar" style="background:#1e3a8a;color:white;padding:10px 20px;display:flex;justify-content:space-between;">
        <h2>Online Test – AI Proctored Mode</h2>
        <div id="timer">05:00</div>
    </div>

    <!-- MAIN CONTAINER -->
    <div style="display:flex; height:calc(100vh - 50px);">

        <!-- QUESTION PANEL -->
        <div style="flex:3; padding:20px; background:white;">
            <h3 id="questionText"></h3>

            <div id="optionsBox"></div>

          <div style="margin-top:20px;">
    <button onclick="saveAnswer()">Save & Next</button>
    <button onclick="markForReview()">Mark for Review</button>
    <button onclick="clearAnswer()">Clear</button>
    <button onclick="prevQ()">Prev</button>
    <button onclick="nextQ()">Next</button>
</div>

        </div>

        <!-- PALETTE PANEL -->
        <div style="flex:1; background:#f8fafc; border-left:1px solid #d1d5db; padding:15px;">
            <h4>Question Palette</h4>
            <div id="paletteBox" style="display:grid; grid-template-columns:repeat(5,1fr); gap:8px;"></div>
        </div>

    </div>

</div>


<script>
const questions = [
    { q: "Q1", options: ["A","B","C","D"] },
    { q: "Q2", options: ["A","B","C","D"] },
    { q: "Q3", options: ["A","B","C","D"] },
    { q: "Q4", options: ["A","B","C","D"] },
    { q: "Q5", options: ["A","B","C","D"] }
];

let current = 0;

function startExam(e){
    if(e){ e.preventDefault(); e.stopPropagation(); }

    document.getElementById("startScreen").style.display="none";
    document.getElementById("examScreen").style.display="block";

    loadQuestion();
    renderPalette();
}

function loadQuestion(){
    const q = questions[current];
    document.getElementById("questionText").innerText = q.q;

    const box = document.getElementById("optionsBox");
    box.innerHTML = "";

    q.options.forEach((opt, i) => {
        const label = document.createElement("label");
        label.style.display = "block";
        label.style.marginBottom = "8px";

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "optionGroup";
        radio.checked = userAnswers[current] === i;
        radio.onclick = () => {
            userAnswers[current] = i;
            renderPalette();
        };

        label.appendChild(radio);
        label.appendChild(document.createTextNode(" " + opt));
        box.appendChild(label);
    });

    renderPalette();
}


function nextQ(){
    if(current < questions.length - 1){
        current++;
        loadQuestion();
    }
}


function saveAnswer() {
    if (userAnswers[current] === null) {
        alert("Please select an option before saving.");
        return;
    }
    nextQ();
}

function markForReview() {
    marked[current] = true;
    renderPalette();
    nextQ();
}

function clearAnswer() {
    userAnswers[current] = null;
    marked[current] = false;
    loadQuestion();
    renderPalette();
}


function prevQ(){
    if(current > 0){
        current--;
        loadQuestion();
    }
}

let userAnswers = new Array(questions.length).fill(null);
let marked = new Array(questions.length).fill(false);

function renderPalette(){
    const p = document.getElementById("paletteBox");
    p.innerHTML = "";

    questions.forEach((q, i) => {
        const btn = document.createElement("button");

        if (marked[i]) btn.className = "marked";
        else if (userAnswers[i] !== null) btn.className = "answered";
        else btn.className = "not-answered";

        btn.innerText = i + 1;
        btn.onclick = () => {
            current = i;
            loadQuestion();
        };

        p.appendChild(btn);
    });
}

</script>




</body>
</html>
