<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Camera Verification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 520px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #1e3a8a;
        }

        p.sub {
            text-align: center;
            color: #555;
            margin-bottom: 20px;
        }

        .video-box {
            border: 2px solid #2563eb;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .instruction {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 0;
            color: #0f172a;
        }

        .status {
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .status.success {
            color: #16a34a;
        }

        .status.error {
            color: #dc2626;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            background: #16a34a;
            color: white;
            cursor: pointer;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        /* MOBILE */

        @media (max-width:768px) {

            .container {
                padding: 22px;
            }

            h2 {
                font-size: 20px;
            }

            p.sub {
                font-size: 14px;
            }

            .video-box {
                margin-bottom: 12px;
            }

            video {
                height: 240px;
            }

            .instruction {
                font-size: 15px;
            }

            .status {
                font-size: 13px;
            }

            button {
                font-size: 16px;
                padding: 14px;
            }

        }
    </style>
</head>

<body>

    <div class="container">
        <h2><i class="fa-solid fa-camera"></i> Camera Verification</h2>
        <p class="sub">Follow the instructions carefully to verify your camera</p>

        <div class="video-box">
            <video id="video" autoplay muted playsinline></video>
        </div>

        <div class="instruction" id="instruction">Initializing camera…</div>
        <div class="status" id="status"></div>

        <button id="continueBtn" disabled onclick="goToExam()">Continue to Exam</button>
    </div>

    <script src="{{ url_for('static', filename='js/face-api.min.js') }}"></script>

    <script>
        const steps = [
            { text: "Look straight at the camera", axis: null },
            { text: "Turn your head LEFT", axis: "x", dir: -1 },
            { text: "Turn your head RIGHT", axis: "x", dir: 1 },
            { text: "Look UP", axis: "y", dir: -1 },
        ];

        let stepIndex = 0;
        let baseX = null, baseY = null;

        const video = document.getElementById("video");
        const instruction = document.getElementById("instruction");
        const status = document.getElementById("status");
        const btn = document.getElementById("continueBtn");

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
        }

        async function loadModels() {
            await faceapi.nets.tinyFaceDetector.loadFromUri("/static/models");
        }

        async function checkStep() {
            const detections = await faceapi.detectSingleFace(
                video,
                new faceapi.TinyFaceDetectorOptions()
            );

            if (!detections) {
                status.innerText = "No face detected";
                status.className = "status error";
                return;
            }

            const box = detections.box;
            const cx = box.x + box.width / 2;
            const cy = box.y + box.height / 2;

            // first step = baseline
            if (stepIndex === 0) {
                baseX = cx;
                baseY = cy;
                nextStep();
                return;
            }

            const step = steps[stepIndex];
            const dx = cx - baseX;
            const dy = cy - baseY;

            let passed = false;

            if (step.axis === "x" && step.dir === -1 && dx < -25) passed = true;
            if (step.axis === "x" && step.dir === 1 && dx > 25) passed = true;
            if (step.axis === "y" && step.dir === -1 && dy < -25) passed = true;
            if (step.axis === "y" && step.dir === 1 && dy > 25) passed = true;

            if (passed) {
                status.innerText = "✔ Verified";
                status.className = "status success";
                setTimeout(nextStep, 1000);
            }
        }

        function nextStep() {
            stepIndex++;
            status.innerText = "";
            status.className = "status";

            if (stepIndex < steps.length) {
                instruction.innerText = steps[stepIndex].text;
            } else {
                instruction.innerText = "Camera verification completed successfully";
                btn.disabled = false;
            }
        }

        function goToExam() {
            fetch("/start_exam", { method: "POST" })
                .then(() => window.location.href = "/exam");
        }

        async function init() {
            await startCamera();
            await loadModels();
            instruction.innerText = steps[0].text;

            setInterval(() => {
                if (stepIndex < steps.length) {
                    checkStep();
                }
            }, 1500);
        }

        init();
    </script>

</body>

</html>
