<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Proctoring Admin Panel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI';
}

body{
background:#020617;
color:white;
padding:40px;
display:flex;
justify-content:center;
}

.container{
width:1200px;
background:#0f172a;
padding:30px;
border-radius:20px;
border:1px solid rgba(56,189,248,0.3);
box-shadow:0 0 40px rgba(56,189,248,0.2);
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
color:#38bdf8;
font-size:26px;
}

.status{
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:red;
}

/* STATS */

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:#020617;
padding:20px;
border-radius:12px;
text-align:center;
border:1px solid rgba(56,189,248,0.2);
}

.card h2{
font-size:34px;
color:#38bdf8;
}

.card p{
color:#94a3b8;
}

/* TABLE */

.section-title{
color:#38bdf8;
margin-bottom:10px;
margin-top:20px;
}

.sessions-table{
max-height:300px;
overflow-y:auto;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:#020617;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid rgba(56,189,248,0.2);
}

th{
color:#38bdf8;
}

tr.completed{
background:rgba(34,197,94,0.1);
}

tr.terminated{
background:rgba(220,38,38,0.15);
}

.logs-btn{
background:none;
border:none;
color:#38bdf8;
cursor:pointer;
}

/* BUTTONS */

.controls{
display:flex;
gap:10px;
margin-bottom:20px;
}

.btn{
padding:10px 18px;
border:none;
border-radius:6px;
background:#38bdf8;
color:#020617;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
opacity:0.9;
}

/* LOG BOX */

.log-box{
background:#020617;
border-radius:10px;
padding:15px;
height:200px;
overflow-y:auto;
font-family:Consolas;
}

/* TEACHER SECTION */

.teacher-section{
margin-top:25px;
}

.teacher-table{
width:100%;
border-collapse:collapse;
}

.teacher-table th,
.teacher-table td{
padding:10px;
border-bottom:1px solid rgba(56,189,248,0.2);
text-align:center;
}

.teacher-btn{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.status-approved{
color:#00ff9d;
font-weight:600;
}

.status-rejected{
color:#ff4d4d;
font-weight:600;
}

.status-pending{
color:#ffc107;
font-weight:600;
}
.footer{
text-align:center;
margin-top:25px;
color:#64748b;
}


.filter-btn{
background:#0ea5e9;
border:none;
padding:6px 12px;
margin-right:6px;
border-radius:6px;
cursor:pointer;
color:white;
font-size:13px;
}

.filter-btn:hover{
background:#0284c7;
}

.approve-btn{
background:#22c55e;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.reject-btn{
background:#ef4444;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.approve-btn:hover{
background:#16a34a;
}

.reject-btn:hover{
background:#dc2626;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>🛡 AI Proctoring Admin Panel</h1>

<div class="status">
<div class="dot" id="statusDot"></div>
<span id="statusText">Connecting...</span>
</div>
</div>

<!-- STATS -->

<div class="cards">

<div class="card">
<h2 id="totalLogs">0</h2>
<p>Total Activities</p>
</div>

<div class="card">
<h2 id="suspiciousCount">0</h2>
<p>Suspicious Activities</p>
</div>

</div>

<!-- SESSIONS -->

<h2 class="section-title">Exam Sessions</h2>

<div class="sessions-table">

<table>

<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Status</th>
<th>Violations</th>
<th>Score</th>
<th>Logs</th>
</tr>
</thead>

<tbody id="sessionsBody"></tbody>

</table>

</div>

<!-- CONTROLS -->

<div class="controls">

<button class="btn" onclick="loadSessions()">Refresh</button> <button class="btn" onclick="clearLogs()">Clear Logs</button> <button class="btn" onclick="autoRefresh()">Auto Refresh</button> <button class="btn" onclick="downloadLogs()">Download Logs</button>

</div>

<!-- LOGS -->

<h2 class="section-title">Activity Logs</h2>

<div class="log-box" id="logBox">
Waiting for logs...
</div>

<!-- TEACHER APPROVAL -->

<div class="teacher-section">

<h2 class="section-title">Teacher Applications</h2>

<div style="margin-bottom:15px;">

<input 
type="text"
id="searchTeacher"
placeholder="Search teacher by name or email..."
style="
padding:8px;
width:250px;
border:1px solid #ccc;
border-radius:5px;
">

</div>

<button class="filter-btn" onclick="filterTeachers('ALL')">ALL</button>

<button class="filter-btn" onclick="filterTeachers('APPROVED')">APPROVED</button>

<button class="filter-btn" onclick="filterTeachers('REJECTED')">REJECTED</button>

<button class="filter-btn" onclick="filterTeachers('UNDER_REVIEW')">PENDING</button>

<button class="filter-btn" onclick="filterTeachers('REAPPLIED')">REAPPLIED</button>



<table class="teacher-table">

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="teacherBody"></tbody>

</table>

</div>

<div class="footer">
AI Based Online Examination Proctoring System
</div>

</div>

<script>
const backendURL="http://127.0.0.1:5000";

let autoInterval=null;
let teachers=[];

/* ---------------- BACKEND STATUS ---------------- */

function checkBackend(){

fetch(backendURL+"/get_sessions")
.then(res=>res.json())
.then(()=>{

document.getElementById("statusDot").style.background="lime";
document.getElementById("statusText").innerText="Backend Connected";

})
.catch(()=>{

document.getElementById("statusDot").style.background="red";
document.getElementById("statusText").innerText="Backend Disconnected";

});

}


/* ---------------- LOAD EXAM SESSIONS ---------------- */

function loadSessions(){

fetch(backendURL+"/get_sessions")
.then(res=>res.json())
.then(data=>{

const tbody=document.getElementById("sessionsBody");
tbody.innerHTML="";

let totalLogs=0;
let suspiciousCount=0;

data.sessions.forEach(s=>{

totalLogs+=s.events.length;
suspiciousCount+=s.violations;

const row=document.createElement("tr");

row.className=s.status==="TERMINATED"?"terminated":"completed";

row.innerHTML=`
<td>${s.name}</td>
<td>${s.roll}</td>
<td>${s.status}</td>
<td>${s.violations}</td>
<td>${s.score ?? "-"}</td>
<td>
<button class="logs-btn"
onclick="alert(\`${s.events.join("\\n")}\`)">
View
</button>
</td>
`;

tbody.appendChild(row);

});

document.getElementById("totalLogs").innerText=totalLogs;
document.getElementById("suspiciousCount").innerText=suspiciousCount;

});

}


/* ---------------- CLEAR LOGS ---------------- */

function clearLogs(){

fetch(backendURL+"/clear_logs",{method:"POST"})
.then(()=>loadSessions());

}


/* ---------------- AUTO REFRESH ---------------- */

function autoRefresh(){

if(autoInterval==null){

autoInterval=setInterval(loadSessions,3000);
alert("Auto refresh enabled");

}else{

clearInterval(autoInterval);
autoInterval=null;
alert("Auto refresh disabled");

}

}


/* ---------------- DOWNLOAD LOGS ---------------- */

function downloadLogs(){

fetch(backendURL+"/get_logs")
.then(res=>res.json())
.then(data=>{

const blob=new Blob([data.logs.join("")],{type:"text/plain"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="proctoring_logs.txt";
a.click();

});

}


/* ---------------- LOAD TEACHERS ---------------- */

function loadTeachers(){

fetch(backendURL+"/get_teachers")
.then(res=>res.json())
.then(data=>{

teachers=data.teachers;

renderTeachers(teachers);

});

}


/* ---------------- RENDER TEACHERS ---------------- */

function renderTeachers(list){

const tbody=document.getElementById("teacherBody");
tbody.innerHTML="";

list.forEach(t=>{

const row=document.createElement("tr");

let actionButtons="";

/* APPROVE / REJECT BUTTON LOGIC */

if(t.status==="UNDER_REVIEW" || t.status==="REAPPLIED"){

actionButtons=`
<button class="approve-btn"
onclick="approveTeacher('${t.email}')">
Approve
</button>

<button class="reject-btn"
onclick="rejectTeacher('${t.email}')">
Reject
</button>
`;

}

else if(t.status==="APPROVED"){

actionButtons=`<span class="status-approved">Approved ✔</span>`;

}

else if(t.status==="REJECTED"){

actionButtons=`<span class="status-rejected">Rejected ✖</span>`;

}

row.innerHTML=`
<td>${t.name}</td>
<td>${t.email}</td>
<td>${t.mobile}</td>
<td class="status-${t.status.toLowerCase()}">${t.status}</td>
<td>${actionButtons}</td>
`;

tbody.appendChild(row);

});

}


/* ---------------- APPROVE TEACHER ---------------- */

function approveTeacher(email){

fetch(backendURL+"/approve_teacher/"+email)
.then(()=>loadTeachers());

}


/* ---------------- REJECT TEACHER ---------------- */

function rejectTeacher(email){

const reason=prompt("Enter rejection reason:");

if(!reason) return;

fetch(backendURL+"/reject_teacher/"+email,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({reason:reason})
})
.then(()=>loadTeachers());

}


/* ---------------- SEARCH TEACHERS ---------------- */

document.getElementById("searchTeacher")
.addEventListener("keyup",function(){

let value=this.value.toLowerCase();

let filtered=teachers.filter(t=>
t.name.toLowerCase().includes(value) ||
t.email.toLowerCase().includes(value)
);

renderTeachers(filtered);

});


/* ---------------- FILTER TEACHERS ---------------- */

function filterTeachers(status){

if(status==="ALL"){

renderTeachers(teachers);
return;

}

let filtered=teachers.filter(t=>t.status===status);

renderTeachers(filtered);

}


/* ---------------- INITIAL LOAD ---------------- */

checkBackend();
loadSessions();
loadTeachers();
</script>

</body>
</html>
