<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Maintenance</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg,#eef2ff,#f8fafc);
            font-family: Arial, sans-serif;
        }

        .box {
            background: white;
            padding: 40px;
            text-align: center;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            max-width: 420px;
        }

        .robot {
            font-size: 70px;
            margin-bottom: 10px;
        }

        h2 {
            color: #1f2937;
            margin-bottom: 10px;
        }

        p {
            color: #6b7280;
            font-size: 15px;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 22px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        a:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="box">
    <div class="robot">🤖</div>
    <h2>System Under Maintenance</h2>
    <p>
        Password recovery is currently unavailable.<br>
        Our AI systems are being upgraded.<br><br>
        Please contact the exam administrator or try again later.
    </p>

    <a href="/login">Back to Login</a>
</div>

</body>
</html>
