<!DOCTYPE html>
<html>
<head>
    <title>Student Attempts</title>
    <style>
        body {
            font-family: Segoe UI;
            background: #f4f6f9;
            padding: 20px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #2d3e60;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .view {
            background: #2563eb;
        }
    </style>
</head>

<body>

<h2>Student Attempts</h2>

<table>

<tr>
    <th>Attempt ID</th>
    <th>Score</th>
    <th>Total</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for a in attempts %}

<tr>
    <td>{{ a.id }}</td>
    <td>{{ a.score }}</td>
    <td>{{ a.total }}</td>
    <td>{{ a.status }}</td>

    <td>
        <a href="/evaluate_exam/{{ a.id }}">
            <button class="btn view">View</button>
        </a>
    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
