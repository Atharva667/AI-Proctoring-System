<!DOCTYPE html>

<style>
/* ================= BASE ================= */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #eef1f5;
    color: #111827;
}

/* ================= HEADER ================= */
.header {
    height: 56px;
    background: #0f172a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 14px;
}

.header-left {
    font-weight: 600;
}

.header-right {
    display: flex;
    gap: 18px;
    align-items: center;
}

.timer {
    background: #020617;
    padding: 6px 12px;
    border-radius: 4px;
    font-weight: 600;
}

/* ================= LAYOUT ================= */
.exam-wrapper {
    display: flex;
    height: calc(100vh - 56px);
}

/* ================= QUESTION PANEL ================= */
.question-panel {
    flex: 3;
    background: #ffffff;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
}

.question-number {
    font-size: 14px;
    color: #2563eb;
    font-weight: 600;
    margin-bottom: 6px;
}

.question-text {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 22px;
}

/* ================= OPTIONS ================= */
.options {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.option {
    border: 1px solid #d1d5db;
    padding: 12px 14px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    font-size: 15px;
}

.option:hover {
    background: #f8fafc;
}

/* ================= CONTROLS ================= */
.controls {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 9px 16px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border-radius: 3px;
}

.save { background: #16a34a; color: #fff; }
.mark { background: #f59e0b; color: #fff; }
.clear { background: #dc2626; color: #fff; }
.next { background: #2563eb; color: #fff; margin-left: auto; }

/* ================= PALETTE ================= */
.palette-panel {
    width: 300px;
    background: #f8fafc;
    border-left: 1px solid #d1d5db;
    padding: 18px;
}

.palette-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
}

.palette {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
}

.palette button {
    height: 34px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    border-radius: 3px;
   
}

.answered { background: #16a34a; color: white; }
.marked { background: #f59e0b; color: white; }
.not-answered { background: #dc2626; color: white; }

/* ================= CAMERA ================= */
#proctorVideo {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 220px;
    height: 165px;
    border: 2px solid #0f172a;
    border-radius: 4px;
    background: black;
}
</style>
</head>

/* ================= STATE ================= */
let current = 0;
let answers = new Array(questions.length).fill(null);
let marked = new Array(questions.length).fill(false);
let time = 300;
let tabSwitches = 0;
let warningCount = 0;
const MAX_WARNINGS = 3;

let examTerminated = false;
let violationLocked = false;
let movementStableFrames = 0;
const STABLE_FRAME_LIMIT = 3;





let lastFrame = null;
let movementActive = false;
let movementWarnings = 0;
const MAX_MOVEMENTS = 3;
let stableCount = 0;

function detectMovement(video) {
    if (examTerminated) return;
    if (video.videoWidth === 0 || video.videoHeight === 0) return;

    const canvas = document.createElement("canvas");
    canvas.width = 160;  // downscale (IMPORTANT)
    canvas.height = 120;
    const ctx = canvas.getContext("2d");

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);

    if (lastFrame) {
        let diff = 0;

        for (let i = 0; i < frame.data.length; i += 16) {
            diff += Math.abs(frame.data[i] - lastFrame.data[i]);
        }

        if (diff > 200000) {
            if (!movementActive) {
                movementActive = true;
                movementWarnings++;

                showWarning(`⚠️ Movement detected (${movementWarnings}/${MAX_MOVEMENTS})`);

                if (movementWarnings >= MAX_MOVEMENTS) {
                    examTerminated = true;
                    showWarning("❌ Exam terminated due to excessive movement");
                    submitExam();
                }
            }
            stableCount = 0;
        } else {
            stableCount++;
            if (stableCount > 3) {
                movementActive = false;
            }
        }
    }

    lastFrame = frame;
}



/* ================= INIT ================= */
window.onload = async () => {
    renderQuestion();
    startTimer();
    enterFullscreen();
    renderPalette();
    await startCamera();

    setInterval(() => {
        const video = document.getElementById("proctorVideo");
        if (video.readyState >= 2) detectMovement(video);
    }, 2000);
};


/* ================= QUESTION RENDER ================= */
function renderQuestion() {
    const q = questions[current];
    document.getElementById("qNo").innerText = "Question " + (current + 1);
    document.getElementById("questionText").innerText = q.q;

    const box = document.getElementById("optionsBox");
    box.innerHTML = "";

    q.options.forEach((opt, i) => {
        const label = document.createElement("label");
        label.className = "option";

    const radio = document.createElement("input");
radio.type = "radio";
radio.name = "optionGroup"; // one option only

radio.onclick = () => {
    answers[current] = i;

    // 🔥 mark question as answered
    marked[current] = false;

    // 🔥 UPDATE palette immediately
    renderPalette();
};



        label.appendChild(radio);
        label.append(" " + opt);
        box.appendChild(label);
    });

    renderPalette();
}


/* ================= CAMERA START ================= */
async function startCamera() {
    const video = document.getElementById("proctorVideo");

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                width: { ideal: 640 },
                height: { ideal: 480 },
                facingMode: "user"
            },
            audio: false
        });

        video.srcObject = stream;
        await video.play();

        console.log("✅ Camera started");

    } catch (err) {
        showWarning("❌ Camera access denied. Allow camera & reload.");
        console.error(err);
    }
}


/* ================= CONTROLS ================= */
function nextQuestion() {
    if (current < questions.length - 1) {
        current++;
        renderQuestion();
    }
}
function saveAnswer() { nextQuestion(); }
function markForReview() {
    marked[current] = true;
    renderPalette();
    nextQuestion();
}
function clearAnswer() {
    answers[current] = null;
    marked[current] = false;
    renderQuestion();
    renderPalette();
}

/* ================= PALETTE ================= */
function renderPalette() {
    const p = document.getElementById("palette");
    p.innerHTML = "";

    questions.forEach((_, i) => {
        const b = document.createElement("button");
        b.innerText = i + 1;
        b.className = marked[i] ? "marked" : answers[i] !== null ? "answered" : "not-answered";
        b.onclick = () => { current = i; renderQuestion(); };
        p.appendChild(b);
    });
}
function issueWarning(reason) {
    if (examTerminated) return;

    // 🔒 Prevent multiple triggers
    if (violationLocked) return;

    violationLocked = true;
    warningCount++;

    showWarning(`⚠️ Warning ${warningCount}/${MAX_WARNINGS}\nReason: ${reason}`);

    // 🔓 Unlock after cooldown
    setTimeout(() => {
        violationLocked = false;
    }, VIOLATION_COOLDOWN);

    if (warningCount >= MAX_WARNINGS) {
        terminateExam(reason);
    }
}



/* ================= TIMER ================= */
function startTimer() {
    setInterval(() => {
        const m = Math.floor(time / 60);
        const s = time % 60;
        document.getElementById("timer").innerText = `${m}:${s.toString().padStart(2,"0")}`;
        time--;
        if (time < 0) submitExam();
    }, 1000);
}

/* ================= SUBMIT ================= */
function confirmSubmit() {
    if (confirm("Are you sure you want to submit the exam?")) submitExam();
}

function submitExam() {
    let score = 0;
    questions.forEach((q,i)=>{
        if(answers[i] === q.answer) score++;
    });

    fetch("/submit_exam", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            score: score,
            total: questions.length,
            violations: tabSwitches
        })
    }).then(()=> window.location.href="/exam_success");
}

function enterFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
}

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        showWarning("❌ Fullscreen exited. Exam terminated.");
        submitExam();
    }
});


/* ================= TAB MONITOR ================= */
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        tabSwitches++;
        document.getElementById("tabCount").innerText = tabSwitches;

        if (tabSwitches >= 3) {
            showWarning("❌ Exam terminated due to multiple tab switches");
            submitExam();
        }
    }
});
async function startExam() {
    await document.documentElement.requestFullscreen();
    document.getElementById("startOverlay").remove();
}

function showWarning(msg) {
    const box = document.getElementById("warningBox");
    box.innerText = msg;
    box.style.display = "block";
    setTimeout(() => box.style.display = "none", 3000);
}


</script>
