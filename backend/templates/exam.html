<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Based Test</title>
    <style>
        /* BASE */
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: #eef1f5;
        }

        /* HEADER */

        .header {
            height: 56px;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .timer {
            background: #020617;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
        }

        /* LAYOUT */

        .exam-wrapper {
            display: flex;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        /* QUESTION PANEL */

        .question-panel {
            flex: 3;
            background: white;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #questionText {
            font-size: 18px;
            margin: 12px 0 18px 0;
        }

        /* OPTIONS */

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            border: 1px solid #d1d5db;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        /* CONTROLS */

        .controls {
            margin-top: auto;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 9px 16px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
        }

        .save {
            background: #16a34a;
            color: white;
        }

        .mark {
            background: #f59e0b;
            color: white;
        }

        .clear {
            background: #dc2626;
            color: white;
        }

        .next {
            background: #2563eb;
            color: white;
            margin-left: auto;
        }

        /* PALETTE */

        .palette-panel {
            width: 280px;
            background: #f8fafc;
            border-left: 1px solid #d1d5db;
            padding: 18px;
            overflow-y: auto;
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .palette button {
            height: 34px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
        }

        .answered {
            background: #16a34a;
            color: white;
        }

        .marked {
            background: #f59e0b;
            color: white;
        }

        .not-answered {
            background: #dc2626;
            color: white;
        }

        /* VIDEO */

        #proctorVideo {
            position: fixed;
            right: 12px;
            bottom: 12px;
            width: 200px;
            height: 150px;
            border: 2px solid #0f172a;
            background: black;
            border-radius: 6px;
            z-index: 999;
        }

        /* ================= MOBILE ================= */

        @media (max-width:900px) {

            .exam-wrapper {
                flex-direction: column;
            }

            .palette-panel {
                width: 100%;
                border-left: none;
                border-top: 1px solid #d1d5db;
                order: -1;
            }

            .palette {
                grid-template-columns: repeat(8, 1fr);
            }

            .question-panel {
                padding: 18px;
            }

            #questionText {
                font-size: 17px;
            }

            .controls {
                gap: 8px;
            }

            .btn {
                flex: 1;
                min-width: 120px;
            }

            #proctorVideo {
                width: 140px;
                height: 100px;
            }

        }

        /* SMALL MOBILE */

        @media (max-width:500px) {

            .header {
                flex-direction: column;
                align-items: flex-start;
                height: auto;
                padding: 12px;
            }

            .timer {
                font-size: 13px;
            }

            .palette {
                grid-template-columns: repeat(6, 1fr);
            }

            .option {
                font-size: 14px;
                padding: 10px;
            }

            #questionText {
                font-size: 16px;
            }

            .btn {
                font-size: 13px;
                padding: 8px 10px;
            }

            #proctorVideo {
                width: 120px;
                height: 90px;
            }

        }
    </style>

</head>

<body>

    <div id="warningBox" style="
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#dc2626;
color:white;
padding:10px 20px;
border-radius:6px;
display:none;
z-index:999999;
font-weight:600;">
    </div>

    <div id="startOverlay" style="
position:fixed;inset:0;
background:#020617;
color:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:99999;">

        <h2>Start Examination</h2>
        <p>Fullscreen mode is mandatory</p>

        <button onclick="startExam()" style="
margin-top:15px;
padding:12px 30px;
font-size:16px;
background:#16a34a;
border:none;
color:white;
cursor:pointer;
border-radius:4px;">
            ENTER FULLSCREEN & START
        </button>

    </div>

    <video id="proctorVideo" autoplay muted playsinline></video>

    <div class="header">

        <div>
            Computer Based Test – AI Proctored Mode
        </div>

        <div class="timer">
            ⏱ <span id="timer">05:00</span>
        </div>

        <div>
            Answered: <span id="answeredCount">0</span>
        </div>

        <div>
            Remaining: <span id="remainingCount">0</span>
        </div>

    </div>

    <div class="exam-wrapper">

        <div class="question-panel">

            <div id="qNo"></div>
            <div id="questionText"></div>
            <div class="options" id="optionsBox"></div>

            <div class="controls">
                <button class="btn save" onclick="saveAnswer()">Save & Next</button>
                <button class="btn mark" onclick="markForReview()">Mark</button>
                <button class="btn clear" onclick="clearAnswer()">Clear</button>
                <button class="btn next" onclick="nextQuestion()">Next</button>
                <button class="btn clear" onclick="confirmSubmit()">Submit</button>
            </div>

        </div>

        <div class="palette-panel">

            <div>Question Palette</div>

            <div class="palette" id="palette"></div>

        </div>

    </div>

    <script>

        /* ================= STATE ================= */

        let questions = [];
        let current = 0;
        let answers = [];
        let marked = [];

        let time = 300;

        const VIOLATION_COOLDOWN = 5000;

        /* ================= START EXAM ================= */

        async function startExam() {

            try {

                const res = await fetch("/get_questions");
                const data = await res.json();

                if (!data.questions || data.questions.length === 0) {
                    alert("Questions not loaded.");
                    return;
                }

                questions = data.questions;

                answers = new Array(questions.length).fill(null);
                marked = new Array(questions.length).fill(false);

                await document.documentElement.requestFullscreen();

                document.getElementById("startOverlay").style.display = "none";

                renderPalette();
                renderQuestion();
                updateCounters();

                startTimer();
                await startCamera();

            }
            catch (err) {

                console.error(err);
                alert("Failed to start exam");

            }

        }

        /* ================= RENDER QUESTION ================= */

        function renderQuestion() {

            const q = questions[current];

            document.getElementById("qNo").innerText = "Question " + (current + 1);
            document.getElementById("questionText").innerText = q.question;

            const box = document.getElementById("optionsBox");
            box.innerHTML = "";

            /* ===== MCQ ===== */

            if (q.type === "mcq") {

                q.options.forEach((opt, i) => {

                    const label = document.createElement("label");
                    label.className = "option";

                    const radio = document.createElement("input");

                    radio.type = "radio";
                    radio.name = "optionGroup";
                    radio.checked = answers[current] === i;

                    radio.onclick = () => {
                        answers[current] = Number(i);
                        marked[current] = false;
                        renderPalette();
                        updateCounters();
                    };

                    label.appendChild(radio);
                    label.append(" " + opt);

                    box.appendChild(label);

                });

            }

            /* ===== SHORT ANSWER ===== */

            else if (q.type === "short") {

                const input = document.createElement("input");

                input.type = "text";
                input.placeholder = "Type your answer here...";
                input.style.padding = "10px";
                input.style.fontSize = "15px";
                input.style.width = "60%";

                input.value = answers[current] || "";

                input.oninput = () => {
                    answers[current] = input.value;
                    marked[current] = false;
                    renderPalette();
                    updateCounters();
                };

                box.appendChild(input);

            }

            /* ===== PARAGRAPH ANSWER ===== */

            else if (q.type === "paragraph") {

                const textarea = document.createElement("textarea");

                textarea.placeholder = "Write your answer here...";
                textarea.rows = 5;
                textarea.style.width = "70%";
                textarea.style.padding = "10px";
                textarea.style.fontSize = "15px";

                textarea.value = answers[current] || "";

                textarea.oninput = () => {
                    answers[current] = textarea.value;
                    marked[current] = false;
                    renderPalette();
                    updateCounters();
                };

                box.appendChild(textarea);

            }

        }

        /* ================= NAVIGATION ================= */

        function nextQuestion() {

            if (current < questions.length - 1) {
                current++;
                renderQuestion();
            }

        }

        function saveAnswer() {
            nextQuestion();
        }

        function markForReview() {

            marked[current] = true;
            renderPalette();
            nextQuestion();

        }

        function clearAnswer() {

            answers[current] = null;
            marked[current] = false;

            renderQuestion();
            renderPalette();
            updateCounters();

        }

        /* ================= PALETTE ================= */

        function renderPalette() {

            const p = document.getElementById("palette");
            p.innerHTML = "";

            questions.forEach((_, i) => {

                const b = document.createElement("button");

                b.innerText = i + 1;

                b.className = marked[i]
                    ? "marked"
                    : answers[i] !== null
                        ? "answered"
                        : "not-answered";

                b.onclick = () => {
                    current = i;
                    renderQuestion();
                };

                p.appendChild(b);

            });

        }

        /* ================= COUNTERS ================= */

        function updateCounters() {

            let answered = answers.filter(a => a !== null).length;

            document.getElementById("answeredCount").innerText = answered;
            document.getElementById("remainingCount").innerText = questions.length - answered;

        }

        /* ================= TIMER ================= */

        function startTimer() {

            setInterval(() => {

                const m = Math.floor(time / 60);
                const s = time % 60;

                document.getElementById("timer").innerText =
                    `${m}:${s.toString().padStart(2, "0")}`;

                time--;

                if (time < 0) submitExam();

            }, 1000);

        }

        /* ================= CAMERA ================= */

        async function startCamera() {

            const video = document.getElementById("proctorVideo");

            try {

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true
                });

                video.srcObject = stream;

            } catch (err) {

                showWarning("Camera denied");

            }

        }

        /* ================= SUBMIT ================= */

        function confirmSubmit() {

            if (confirm("Submit exam?")) {
                submitExam();
            }

        }

        function submitExam() {

            let score = 0;

            questions.forEach((q, i) => {

                if (q.type === "mcq") {

                    if (answers[i] !== null && answers[i] !== undefined) {

                        const userAns = Number(answers[i]);
                        const correctAns = Number(q.answer);

                        console.log("Q", i, "User:", userAns, "Correct:", correctAns);

                        if (userAns === correctAns) {
                            score++;
                        }

                    }

                }

            });

            fetch("/submit_exam", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    exam_id: questions[0].exam_id,
                    score: score,
                    total: questions.length,
                    violations: 0,
                    answers: answers
                })
            })
                .then(() => window.location.href = "/exam_success");

        }

        /* ================= WARNINGS ================= */

        function showWarning(msg) {

            const box = document.getElementById("warningBox");

            box.innerText = msg;
            box.style.display = "block";

            setTimeout(() => box.style.display = "none", 3000);

        }




        /* ================= TAB SWITCH DETECTION ================= */

        function sendViolation(message) {

            fetch("/log_event", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    event: "VIOLATION| " + message
                })
            });

            showWarning(message);
        }

        /* Detect tab change */
        document.addEventListener("visibilitychange", () => {

            if (document.hidden) {
                sendViolation("Tab switched / minimized");
            }

        });

    </script>

</body>

</html>
