<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="login-container">

        <!-- LOGIN SUCCESS TOAST -->
        <div id="loginSuccessToast" style="
        display:none;
        position:fixed;
        top:30px;
        right:30px;
        background:linear-gradient(135deg,#22c55e,#16a34a);
        color:white;
        padding:16px 28px;
        box-shadow:0 0 25px rgba(34,197,94,0.6);
        font-weight:bold;
        font-size:16px;
        z-index:9999;
        animation: slideIn 0.4s ease;
    ">
            ✅ Login Successful
        </div>

        <style>
            @keyframes slideIn {
                from {
                    transform: translateX(100px);
                    opacity: 0;
                }

                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        </style>

        <!-- HEADER -->
        <div class="login-header">
            Login
        </div>

        <!-- INSTRUCTIONS -->
        <div class="instructions-box">
            <b>Instructions:</b>
            <ul>
                <li>Enter your registered email and password.</li>
                <li>Click Login to authenticate.</li>
                <li>Face verification will be performed during the exam.</li>
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="login-content">

            <!-- LEFT FORM -->
            <div class="login-form">
                <label>Email or Phone Number:</label>
                <input type="text" id="login_input" placeholder="Enter email or phone number">

                <label>Password:</label>
                <input type="password" id="password" placeholder="Enter your password">

                <button onclick="login()">Login</button>
                <div class="forgot-password">
                    <a href="/maintenance">Forgot Password?</a>
                </div>

            </div>

            <!-- RIGHT INFO (NO CAMERA) -->
            <div class="face-box">
                <h3>AI Face Verification</h3>
                <p style="color:#555; font-size:14px;">
                    Your face will be monitored continuously during the exam using AI-based proctoring.
                </p>
            </div>

        </div>

    </div>

    <script>
        function showLoginSuccess() {
            const toast = document.getElementById("loginSuccessToast");
            toast.style.display = "block";

            setTimeout(() => {
                toast.style.display = "none";
                window.location.href = "/view_result";
            }, 1500);
        }

        function login() {

    const loginInput = document.getElementById("login_input").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!loginInput || !password) {
        alert("Please enter email/phone and password");
        return;
    }

    // ✅ TIMEOUT CONTROLLER
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);

    fetch("/login", {
        method: "POST",
        signal: controller.signal,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            login: loginInput,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {

        clearTimeout(timeout);

        if (data.status === "success") {
            showLoginSuccess();
        } else {
            alert(data.message);
        }

    })
    .catch(err => {

        console.error("Login error:", err);

        // ❌ you had typo here → aalert ❌
        alert("Server is waking up (free hosting). Please wait 5 seconds and try again.");

        setTimeout(() => {
            location.reload();
        }, 2000);

    });
}
    </script>

</body>

</html>
